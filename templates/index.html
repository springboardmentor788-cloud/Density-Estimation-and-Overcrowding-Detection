<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crowd Counting Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="logo">CROWD AI PRO</div>
        <div class="system-status">
            <span id="status-dot" style="display:inline-block; width:10px; height:10px; background:#4ade80; border-radius:50%; margin-right:8px;"></span>
            LIVE MONITORING
        </div>
    </header>

    <main>
        <section class="card video-section" id="feed-container">
            <img src="{{ url_for('video_feed') }}" class="video-feed" alt="Real-time AI Feed">
            <div id="alert-banner" style="display:none; position:absolute; top:20px; right:20px; background:rgba(239, 68, 68, 0.9); color:white; padding:10px 20px; border-radius:12px; font-weight:bold; backdrop-filter:blur(10px);">
                HIGH DENSITY ALERT
            </div>
        </section>

        <section class="stats-grid">
            <div class="card stat-card">
                <span class="stat-label">Video Source</span>
                <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
                    <input type="text" id="source-input" placeholder="Webcam index or file path" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:8px; border-radius:8px;">
                    <button id="load-btn" style="background:var(--primary); color:var(--bg); border:none; padding:8px; border-radius:8px; cursor:pointer; font-weight:bold;">LOAD SOURCE</button>
                    
                    <div style="height:1px; background:rgba(255,255,255,0.1); margin:10px 0;"></div>
                    
                    <span class="stat-label">Upload Video/Image</span>
                    <input type="file" id="file-upload" style="display:none;">
                    <button id="upload-btn" style="background:rgba(255,255,255,0.1); color:white; border:1px dashed rgba(255,255,255,0.3); padding:15px; border-radius:12px; cursor:pointer;">
                        CHOOSE FILE
                    </button>
                    <div id="upload-status" style="font-size:0.75rem; opacity:0.6; text-align:center;"></div>
                </div>
            </div>
            <div class="card stat-card">
                <span class="stat-label">System Mode & Logic</span>
                <span class="stat-value" id="mode-val">CSRNET (Stage 3)</span>
                <small style="opacity:0.6;">Width: 800px | Scale: 1.66 | Skip: 20fps</small>
            </div>
            <div class="card stat-card">
                <span class="stat-label">Detection Threshold</span>
                <span class="stat-value" id="threshold-val">45.0</span>
            </div>
            <div class="card stat-card">
                <span class="stat-label">Connection Status</span>
                <span class="stat-value" id="conn-val">Active</span>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 AI Fall & Crowd Detection System | Optimized for Real-time Edge Computing
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
